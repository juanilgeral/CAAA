<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema em Manutenção</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(#0a001f, #1a0033);
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 920px;
      padding: 20px;
    }

    h1 {
      font-size: 3.8rem;
      margin-bottom: 15px;
      text-shadow: 
        0 0 20px #00ffcc,
        0 0 40px #00ffcc;
      animation: glitch 1.5s infinite alternate;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 1.35rem;
      margin-bottom: 40px;
      color: #00ffaa;
    }

    .scene {
      position: relative;
      height: 420px;
      background: #000011;
      border: 10px solid #00ffcc;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 
        0 0 60px #00ffcc,
        inset 0 0 40px rgba(0, 255, 204, 0.2);
      margin: 0 auto;
    }

    .computer {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 210px;
      background: #1a1a1a;
      border: 14px solid #333;
      border-radius: 12px;
      box-shadow: 0 0 35px #ff00aa;
    }

    .screen {
      position: absolute;
      top: 25px;
      left: 25px;
      right: 25px;
      height: 110px;
      background: #001122;
      border: 5px solid #00ff88;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error {
      color: #ff0066;
      font-size: 1.4rem;
      text-shadow: 0 0 15px #ff0066;
      animation: blink 0.7s infinite;
    }

    .worker {
      position: absolute;
      font-size: 4.8rem;
      animation: work 2.8s infinite ease-in-out;
      filter: drop-shadow(0 0 12px #ffff00);
    }

    .worker1 {
      left: 22%;
      top: 58%;
      animation-delay: 0s;
    }

    .worker2 {
      right: 22%;
      top: 52%;
      animation-delay: 1.1s;
      transform: scaleX(-1);
    }

    .tool {
      position: absolute;
      font-size: 2.4rem;
      animation: toolMove 1.4s infinite alternate ease-in-out;
    }

    .hammer {
      left: 30%;
      top: 65%;
    }

    .wrench {
      right: 30%;
      top: 60%;
      animation-delay: 0.7s;
    }

    .contact {
      margin-top: 35px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #aaffff;
    }

    .contact a {
      color: #00ffcc;
      text-decoration: none;
      transition: all 0.3s;
    }

    .contact a:hover {
      color: #ffff00;
      text-shadow: 0 0 15px #ffff00;
    }

    /* Animações */
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-4px, 4px); }
      40% { transform: translate(4px, -4px); }
      60% { transform: translate(-2px, 2px); }
      100% { transform: translate(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes work {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(18deg); }
    }

    @keyframes toolMove {
      from { transform: rotate(-35deg) translateY(0); }
      to { transform: rotate(35deg) translateY(-18px); }
    }

    .sparks {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ffff00;
      border-radius: 50%;
      box-shadow: 0 0 15px #ffff00;
      animation: sparkAnim 0.9s linear forwards;
    }

    @keyframes sparkAnim {
      to {
        transform: translateY(-80px) scale(0.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SISTEMA EM MANUTENÇÃO</h1>
    <p class="subtitle">Estamos consertando tudo o mais rápido possível!</p>

    <div class="scene">
      <!-- Computador -->
      <div class="computer">
        <div class="screen">
          <div class="error">ERROR 404</div>
        </div>
      </div>

      <!-- Operários -->
      <div class="worker worker1">👷‍♂️</div>
      <div class="worker worker2">👷</div>

      <!-- Ferramentas -->
      <div class="tool hammer">🔨</div>
      <div class="tool wrench">🔧</div>

      <!-- Faíscas -->
      <div class="sparks" id="sparks"></div>
    </div>

    <div class="contact">
      <p>Precisa de alguma melhoria ou urgência?</p>
      <p>Entre em contato com o administrador do sistema:</p>
      <p><strong>Ekland</strong> 
        <a href="https://wa.me/5521972690650" target="_blank">
          📱 (21) 97269-0650 
        </a>
      </p>
    </div>
  </div>

  <script>
    // Gerar faíscas
    function createSpark() {
      const spark = document.createElement('div');
      spark.classList.add('spark');
      
      const x = Math.random() * 300 + 310;
      spark.style.left = x + 'px';
      spark.style.top = '220px';
      
      const duration = Math.random() * 600 + 700;
      spark.style.animationDuration = duration + 'ms';
      
      document.getElementById('sparks').appendChild(spark);
      
      setTimeout(() => spark.remove(), duration);
    }

    // Faíscas contínuas
    setInterval(() => {
      if (Math.random() > 0.35) createSpark();
    }, 70);

    // Efeito extra no título
    setInterval(() => {
      const title = document.querySelector('h1');
      title.style.animation = 'none';
      setTimeout(() => {
        title.style.animation = 'glitch 1.5s infinite alternate';
      }, 10);
    }, 5000);
  </script>
</body>
</html>
