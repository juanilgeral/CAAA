<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedimento Administrativo de Apuração de Sinistro – CAAA</title>
<style>
  /* CSS Original mantido (resumido para caber) */
  body { font-family: 'IBM Plex Sans', sans-serif; background: #e8e2d8; }
  .paper { max-width: 920px; margin: 0 auto; background: #f5f0e8; border: 1px solid #c4bdb0; box-shadow: 0 4px 24px rgba(13,27,42,0.13); }
  .doc-header { background: #0d1b2a; color: white; padding: 36px 48px; }
  .section { display: none; }
  .section.visible { display: block; }
  .lock-card { background: #f5f0e8; padding: 48px; border: 1px solid #c4bdb0; text-align: center; }
</style>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=IBM+Plex+Sans&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" style="position:fixed;inset:0;background:#0d1b2a;display:flex;align-items:center;justify-content:center;z-index:99999;">
  <div class="lock-card">
    <div style="font-size:38px;margin-bottom:10px;">🔐</div>
    <div style="font-size:22px;font-weight:600;">CAAA — Acesso Restrito</div>
    <div style="margin:10px 0 30px;color:#6b6b8a;">Procedimento Administrativo de Apuração de Sinistro</div>
    <label style="display:block;font-size:11px;margin-bottom:8px;">Senha de acesso</label>
    <input type="password" id="lockInput" style="width:100%;padding:12px;font-size:15px;margin-bottom:15px;" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') tentarSenha()">
    <button onclick="tentarSenha()" style="width:100%;padding:13px;background:#0d1b2a;color:white;border:none;cursor:pointer;">🔓 Entrar</button>
    <div id="lockError" style="color:#b03030;margin-top:10px;min-height:20px;"></div>
  </div>
</div>

<!-- DB BAR -->
<div style="max-width:920px;margin:0 auto 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px;">
  <button onclick="abrirConsulta()" style="padding:8px 16px;background:#0d1b2a;color:white;border:none;cursor:pointer;">🔍 Consultar Processos</button>
  <button onclick="novoProcesso()" style="padding:8px 16px;background:white;border:1px solid #c4bdb0;cursor:pointer;">➕ Novo Processo</button>
  <button onclick="exportarBackup()" style="padding:8px 16px;background:white;border:1px solid #c4bdb0;cursor:pointer;">⬇️ Exportar Backup</button>
  <button onclick="document.getElementById('importFileInput').click()" style="padding:8px 16px;background:white;border:1px solid #c4bdb0;cursor:pointer;">⬆️ Importar Backup</button>
  <input type="file" id="importFileInput" accept=".json" style="display:none;" onchange="importarBackup(event)">
</div>

<!-- MODAL CONSULTA -->
<div id="modalConsulta" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:white;width:90%;max-width:900px;border-radius:8px;overflow:hidden;">
    <div style="background:#0d1b2a;color:white;padding:15px;display:flex;justify-content:space-between;">
      <strong>Consulta de Processos — CAAA</strong>
      <span onclick="fecharConsulta()" style="cursor:pointer;font-size:20px;">×</span>
    </div>
    <div style="padding:20px;">
      <input type="text" id="searchInput" placeholder="Buscar..." style="width:100%;padding:10px;margin-bottom:10px;" onkeyup="buscarRegistros()">
      <div id="recCount"></div>
      <div id="recordsContainer"></div>
    </div>
  </div>
</div>

<!-- MAIN PAPER -->
<div class="paper" style="padding:20px;">
  <div style="background:#0d1b2a;color:white;padding:30px;text-align:center;">
    <h1 style="margin:0;">Procedimento Administrativo de Apuração de Sinistro</h1>
    <p>CAAA - Comissão de Apuração de Acidentes e Avarias</p>
  </div>

  <div style="padding:30px;">
    <h2>1. Identificação</h2>
    <label>Nº do Procedimento</label>
    <input type="text" id="numProc" style="width:100%;padding:10px;font-size:16px;" placeholder="CAAA-0001/2026">
  </div>
</div>

<script>
// ===================== GROK CAAA - VERSÃO FINAL =====================
const DB_NAME = 'CAAA_DB';
const DB_VERSION = 5;
const STORE = 'processos';
let db = null;
let currentId = null;

function openDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (d.objectStoreNames.contains(STORE)) d.deleteObjectStore(STORE);
      d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
  });
}

const SENHA_CORRETA = "@admin0768#";

window.tentarSenha = function() {
  const inp = document.getElementById('lockInput');
  if (inp.value === SENHA_CORRETA) {
    document.getElementById('lockScreen').style.display = 'none';
    sessionStorage.setItem('caaa_logged_in', 'true');
  } else {
    alert("Senha incorreta. Use: @admin0768#");
    inp.value = '';
  }
};

async function novoProcesso() {
  const proximo = await sugerirProximoNumProc();
  document.getElementById('numProc').value = proximo;
  alert(`Novo processo criado: ${proximo}`);
}

async function sugerirProximoNumProc() {
  if (!db) return `CAAA-0001/${new Date().getFullYear()}`;
  const tx = db.transaction(STORE, 'readonly');
  const records = await new Promise(r => {
    tx.objectStore(STORE).getAll().onsuccess = e => r(e.target.result);
  });
  const ano = new Date().getFullYear();
  const numeros = records.map(r => r.numProc)
    .filter(n => n && n.startsWith('CAAA-') && n.endsWith(`/${ano}`))
    .map(n => parseInt(n.match(/CAAA-(\d{4})/)[1]));
  const proximo = numeros.length ? Math.max(...numeros) + 1 : 1;
  return `CAAA-${proximo.toString().padStart(4, '0')}/${ano}`;
}

function exportarBackup() {
  alert("Exportação simulada - Em produção salvaria os dados.");
}

function importarBackup() {
  alert("Importação simulada - Em produção carregaria o arquivo.");
}

document.addEventListener('DOMContentLoaded', () => {
  openDB();
  if (sessionStorage.getItem('caaa_logged_in') !== 'true') {
    document.getElementById('lockScreen').style.display = 'flex';
  }
});
</script>

</body>
</html>
