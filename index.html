<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema em Manutenção</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(#0a0a2a, #1a1a4a);
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 900px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #00ffcc;
      animation: glitch 1s infinite alternate;
    }

    .subtitle {
      font-size: 1.4rem;
      margin-bottom: 60px;
      opacity: 0.9;
    }

    .scene {
      position: relative;
      height: 400px;
      background: #000814;
      border: 8px solid #00ffcc;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 40px #00ffcc;
    }

    .computer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 200px;
      background: #222;
      border: 12px solid #444;
      border-radius: 10px;
      box-shadow: 0 0 30px #ff00aa;
    }

    .screen {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      height: 100px;
      background: #001122;
      border: 4px solid #00ffcc;
      overflow: hidden;
    }

    .screen::after {
      content: "ERROR 404";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0066;
      font-size: 1.1rem;
      animation: blink 0.8s infinite;
    }

    .worker {
      position: absolute;
      font-size: 4rem;
      animation: work 3s infinite ease-in-out;
      filter: drop-shadow(0 0 10px #ffff00);
    }

    .worker1 {
      left: 25%;
      top: 60%;
      animation-delay: 0s;
    }

    .worker2 {
      right: 25%;
      top: 55%;
      animation-delay: 1.2s;
      transform: scaleX(-1);
    }

    .tool {
      position: absolute;
      font-size: 2rem;
      animation: toolMove 1.5s infinite alternate;
    }

    .hammer {
      left: 32%;
      top: 65%;
      animation-delay: 0.3s;
    }

    .wrench {
      right: 32%;
      top: 62%;
      animation-delay: 1.5s;
    }

    .message {
      margin-top: 40px;
      font-size: 1.1rem;
      line-height: 1.8;
      text-shadow: 0 0 10px #00ffcc;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(3px, -3px); }
      60% { transform: translate(-2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes work {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }

    @keyframes toolMove {
      from { transform: rotate(-30deg) translateY(0); }
      to { transform: rotate(30deg) translateY(-15px); }
    }

    .sparks {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffff00;
      border-radius: 50%;
      box-shadow: 0 0 12px #ffff00;
      animation: sparkAnim 1.2s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SISTEMA EM MANUTENÇÃO</h1>
    <p class="subtitle">Estamos consertando tudo o mais rápido possível!</p>

    <div class="scene">
      <!-- Computador -->
      <div class="computer">
        <div class="screen"></div>
      </div>

      <!-- Operários -->
      <div class="worker worker1">👷‍♂️</div>
      <div class="worker worker2">👷</div>

      <!-- Ferramentas -->
      <div class="tool hammer">🔨</div>
      <div class="tool wrench">🔧</div>

      <!-- Faíscas -->
      <div class="sparks" id="sparks"></div>
    </div>

    <div class="message">
      <p>Os técnicos estão trabalhando duro para trazer o sistema de volta.</p>
      <p>Por favor, volte mais tarde. Obrigado pela paciência! 🚧</p>
    </div>
  </div>

  <script>
    // Gerar faíscas animadas
    function createSpark() {
      const spark = document.createElement('div');
      spark.classList.add('spark');
      
      const computer = document.querySelector('.computer');
      const rect = computer.getBoundingClientRect();
      const scene = document.querySelector('.scene');
      
      spark.style.left = (Math.random() * 280 + (scene.offsetWidth/2 - 140)) + 'px';
      spark.style.top = (Math.random() * 120 + 180) + 'px';
      
      const duration = Math.random() * 800 + 600;
      spark.style.animationDuration = duration + 'ms';
      
      document.getElementById('sparks').appendChild(spark);
      
      setTimeout(() => {
        spark.remove();
      }, duration);
    }

    // Criar faíscas continuamente
    setInterval(() => {
      if (Math.random() > 0.4) {
        createSpark();
      }
    }, 80);

    // Mensagem piscando ocasionalmente
    setInterval(() => {
      const messages = document.querySelectorAll('.message p');
      messages.forEach(msg => {
        msg.style.transition = 'opacity 0.3s';
        msg.style.opacity = '0.4';
        setTimeout(() => {
          msg.style.opacity = '1';
        }, 200);
      });
    }, 4000);
  </script>
</body>
</html>
