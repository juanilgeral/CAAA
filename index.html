<script>
// ============================================================
// INDEXEDDB — PERSISTENCE ENGINE (VERSÃO CORRIGIDA 2026)
// ============================================================
const DB_NAME = 'CAAA_DB';
const DB_VERSION = 3;
const STORE = 'processos';
let db = null;
let currentId = null;
let autoSaveTimer = null;
let isRestoring = false;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const store = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('numProc', 'numProc', { unique: false });
        store.createIndex('nomeEmp', 'nomeEmp', { unique: false });
        store.createIndex('placaBem', 'placaBem', { unique: false });
        store.createIndex('updatedAt', 'updatedAt', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

// Coleta dados do formulário
function collectFormData() {
  const data = {};
  document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
    data[el.id] = el.value.trim();
  });

  const radioNames = ['comunicou','instaurar','formaNotif','compareceu','modalDefesa','falhaManu','solicitouPrazo','gravada','penalidade','haDesconto','rescisorio','recurso','haTerceiro'];
  radioNames.forEach(name => {
    const checked = document.querySelector(`input[name="${name}"]:checked`);
    data['radio_' + name] = checked ? checked.value : '';
  });

  const checkNames = ['provas'];
  checkNames.forEach(name => {
    const checked = [...document.querySelectorAll(`input[name="${name}"]:checked`)];
    data['check_' + name] = checked.map(c => c.parentElement.textContent.trim()).join('|');
  });

  const dc = document.querySelector('#sec4 .decision-card.selected-card .dc-title');
  data.decisaoLabel = dc ? dc.textContent.trim() : '';
  data.decisaoTipo = document.getElementById('decisaoTipo')?.value || '';

  ['p1','p2','p3','p4'].forEach(p => data[`${p}voto`] = document.getElementById(`${p}voto`)?.value || '');
  ['di1','di2','di3','di4'].forEach(p => data[`${p}_voto`] = document.getElementById(p + '_voto')?.value || '');

  data.registrosPorExtenso = coletarRegistrosPorExtenso ? coletarRegistrosPorExtenso() : [];
  data.status = data.decisaoTipo ? 'finalizado' : 'em-andamento';
  data.updatedAt = new Date().toISOString();
  data.numProc = document.getElementById('numProc').value.trim();
  data.nomeEmp = document.getElementById('nomeEmp').value.trim();
  data.placaBem = document.getElementById('placaBem').value.trim();

  return data;
}

// Sugere o próximo número de processo automaticamente
async function sugerirProximoNumProc() {
  if (!db) {
    const ano = new Date().getFullYear();
    return `CAAA-0001/${ano}`;
  }

  return new Promise(resolve => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => {
      const records = req.result || [];
      const anoAtual = new Date().getFullYear();

      const numeros = records
        .map(r => r.numProc)
        .filter(n => n && n.match(/^CAAA-\d{4}\/\d{4}$/))
        .map(n => parseInt(n.match(/CAAA-(\d{4})/)[1], 10))
        .filter(n => n > 0);

      let proximo = numeros.length ? Math.max(...numeros) + 1 : 1;
      resolve(`CAAA-${proximo.toString().padStart(4, '0')}/${anoAtual}`);
    };
    req.onerror = () => resolve(`CAAA-0001/${new Date().getFullYear()}`);
  });
}

// Salvar no banco
async function salvarNoDB(showMsg = true) {
  if (!db) return;
  const data = collectFormData();
  if (!data.numProc && !data.nomeEmp) return;

  const duplicado = await checkNumProcDuplicado(data.numProc, currentId);
  if (duplicado) {
    mostrarErroDuplicata(true);
    showSaveIndicator('⛔ Número de processo já existe!');
    return;
  }

  if (currentId) data.id = currentId;

  const tx = db.transaction(STORE, 'readwrite');
  const req = currentId ? tx.objectStore(STORE).put(data) : tx.objectStore(STORE).add(data);

  req.onsuccess = e => {
    if (!currentId) currentId = e.target.result;
    updateDbStatus();
    if (showMsg) showSaveIndicator('✓ Salvo automaticamente');
  };
}

function showSaveIndicator(msg) {
  const ind = document.getElementById('saveIndicator');
  ind.textContent = msg;
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2800);
}

async function checkNumProcDuplicado(numProc, excludeId) {
  if (!db || !numProc) return false;
  return new Promise(resolve => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = e => {
      const exists = (e.target.result || []).some(r => 
        r.numProc && r.numProc.trim().toLowerCase() === numProc.trim().toLowerCase() && r.id !== excludeId
      );
      resolve(exists);
    };
    req.onerror = () => resolve(false);
  });
}

function mostrarErroDuplicata(show) {
  const inp = document.getElementById('numProc');
  if (!inp) return;
  inp.style.borderColor = show ? '#b03030' : '';
  inp.style.boxShadow = show ? '0 0 0 3px rgba(176,48,48,0.2)' : '';
}

// Novo Processo com numeração automática
async function novoProcesso() {
  if (currentId) await salvarNoDB(false);

  if (!confirm('Iniciar um novo processo? O atual será salvo automaticamente.')) return;

  isRestoring = true;
  currentId = null;

  document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el => {
    if (el.type !== 'hidden') el.value = '';
  });
  document.querySelectorAll('.opt-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.decision-card').forEach(el => el.classList.remove('selected-card'));
  document.querySelectorAll('.voto-opt').forEach(el => el.classList.remove('voto-selected'));

  const proximoNum = await sugerirProximoNumProc();
  document.getElementById('numProc').value = proximoNum;
  updateBadge();

  document.getElementById('blocoTerceiro').style.display = 'none';
  const tb = document.getElementById('tabelaParcelas');
  if (tb) tb.style.display = 'none';
  const bodyP = document.getElementById('parcelasBody');
  if (bodyP) bodyP.innerHTML = '';

  goTo(0);
  showSaveIndicator(`➕ Novo processo iniciado — Número: ${proximoNum}`);
  setTimeout(() => { isRestoring = false; }, 600);
}

// Exportar Backup
async function exportarBackup() {
  if (!db) return alert('Banco de dados não está pronto.');
  const tx = db.transaction(STORE, 'readonly');
  const req = tx.objectStore(STORE).getAll();
  req.onsuccess = () => {
    const records = req.result || [];
    const payload = {
      exportedAt: new Date().toISOString(),
      appVersion: 'CAAA-FORM v2.1 (corrigido)',
      totalRecords: records.length,
      records: records
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `CAAA_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showSaveIndicator(`⬇️ Backup exportado (${records.length} processos)`);
  };
}

// Importar Backup
function importarBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const reader = new FileReader();
  reader.onload = async function(e) {
    let payload;
    try { payload = JSON.parse(e.target.result); } catch(err) {
      alert('Arquivo JSON inválido.');
      return;
    }

    const records = Array.isArray(payload.records) ? payload.records : Array.isArray(payload) ? payload : [];
    if (!records.length) return alert('Nenhum processo encontrado no arquivo.');

    const substituir = confirm(`Importar ${records.length} processo(s)?\n\nOK = Adicionar mantendo os atuais\nCancelar = Substituir tudo (apagar atuais)`);

    if (!substituir) {
      if (!confirm('⚠️ TODOS os processos atuais serão apagados. Confirma?')) return;
      await new Promise(r => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).clear().onsuccess = r;
      });
    }

    let importados = 0;
    for (const rec of records) {
      const novo = {...rec};
      delete novo.id;

      if (await checkNumProcDuplicado(novo.numProc)) {
        novo.numProc = await sugerirProximoNumProc();
      }

      await new Promise(resolve => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).add(novo).onsuccess = () => { importados++; resolve(); };
        tx.onerror = () => resolve();
      });
    }
    showSaveIndicator(`✅ ${importados} processo(s) importado(s) com sucesso!`);
    if (document.getElementById('modalConsulta').classList.contains('open')) buscarRegistros();
  };
  reader.readAsText(file);
}

// Inicialização
document.addEventListener('DOMContentLoaded', async () => {
  await openDB().catch(console.error);
  
  // Sugere número inicial
  if (!currentId) {
    const numSug = await sugerirProximoNumProc();
    const inp = document.getElementById('numProc');
    if (inp && !inp.value) inp.placeholder = numSug;
  }
});

// Auto-save (mantido)
document.addEventListener('input', () => {
  if (isRestoring) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => salvarNoDB(true), 2000);
});
document.addEventListener('change', () => {
  if (isRestoring) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => salvarNoDB(true), 1000);
});
